name: Manevi Kale IPA Pişirici
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Bağımlılıkları Sıfırdan Kur
        run: |
          npm install --legacy-peer-deps

      - name: Expo ve EAS CLI Hazırla
        run: |
          npm install -g eas-cli
          npm install -g expo

      - name: iOS Projesini Derle (Export)
        run: |
          npx expo export --platform ios

      - name: IPA Dosyasını Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Manevi-Kale-IPA-Build
          path: dist/
