name: Manevi Kale IPA Hazırla
on:
  workflow_dispatch: # Sadece butona basınca çalışsın (veya push ekle)

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Node Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bağımlılıkları Kur
        run: npm install

      - name: iOS Projesini Oluştur (Prebuild)
        run: npx expo prebuild --platform ios --no-install

      - name: Xcode ile Derle (Unsigned)
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
            -scheme $(ls -d *.xcodeproj | sed 's/\.xcodeproj//') \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath build

      - name: IPA Paketle (KSign için hazır)
        run: |
          mkdir -p Payload
          # Oluşan .app dosyasını bul ve Payload içine kopyala
          cp -R ios/build/Build/Products/Release-iphoneos/*.app Payload/
          # Payload klasörünü zipleyip .ipa yap
          zip -r ManeviKale_Unsigned.ipa Payload

      - name: Dosyayı Yükle
        uses: actions/upload-artifact@v4
        with:
          name: KSign-Hazir-IPA
          path: ManeviKale_Unsigned.ipa
