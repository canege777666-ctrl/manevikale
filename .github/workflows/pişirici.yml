name: Manevi Kale IPA Pişirici
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: pnpm Kur
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Zorla Kurulum (Workspace Devre Dışı)
        run: |
          # Workspace hatasını engellemek için pnpm'i kandırıyoruz
          rm -f pnpm-workspace.yaml
          pnpm install --no-frozen-lockfile --ignore-scripts --force
          # Expo eksikse zorla ekle
          pnpm add expo@latest

      - name: Expo Hazırlık
        run: |
          pnpm add -g eas-cli expo
          npx expo prebuild --platform ios --no-install

      - name: iOS Export
        run: |
          npx expo export --platform ios --non-interactive

      - name: IPA Dosyasını Sakla
        uses: actions/upload-artifact@v4
        with:
          name: Manevi-Kale-IPA
          path: dist/
