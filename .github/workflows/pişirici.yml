name: Manevi Kale IPA Pişirici
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: pnpm Kur
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Bağımlılıkları Kur
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts

      - name: iOS Yapılandırmasını Zorla
        run: |
          pnpm add -g eas-cli expo
          # Expo'ya iOS platformunu gözüne soka soka öğretiyoruz
          npx expo prebuild --platform ios --no-install

      - name: IPA Hazırla (Kesin Çözüm)
        run: |
          # Hata aldığın yeri 'npx expo export' yerine 'eas build' mantığıyla ama lokalde yapıyoruz
          export CI=1
          npx expo export --platform ios --output-dir dist

      - name: IPA Dosyasını Sakla
        uses: actions/upload-artifact@v4
        with:
          name: Manevi-Kale-Build
          path: dist/
