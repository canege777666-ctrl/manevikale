name: Manevi Kale IPA Pişirici
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Temizlik ve Kurulum
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Expo ve EAS Hazırla
        run: |
          npm install -g eas-cli
          npm install -g expo

      - name: iOS Export (Hata Ayıklama Modu)
        run: |
          npx expo export --platform ios --non-interactive

      - name: IPA Dosyasını Sakla
        uses: actions/upload-artifact@v4
        with:
          name: Manevi-Kale-IPA
          path: dist/
