name: Manevi Kale IPA Pişirici
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: pnpm Kur
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Bağımlılıkları Kur
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Expo Ayarlarını Düzelt
        run: |
          # Eğer ios tanımı yoksa ekle
          npx expo install expo-updates
          sed -i '' 's/"platforms": \[/"platforms": ["ios", /g' app.json || echo "Platform ayarı zaten var"

      - name: iOS Export (Zorla)
        run: |
          pnpm add -g eas-cli expo
          # npx expo export yerine daha sağlam olan prebuild adımını deniyoruz
          npx expo prebuild --platform ios --no-install
          npx expo export --platform ios --non-interactive

      - name: IPA Dosyasını Sakla
        uses: actions/upload-artifact@v4
        with:
          name: Manevi-Kale-IPA
          path: dist/
