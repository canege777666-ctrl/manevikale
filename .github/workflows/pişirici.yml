name: Manevi Kale IPA Pişirici
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: pnpm Kur
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Versiyonu 9'a çektik, katalog desteği daha sağlam

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Bağımlılıkları Kur (Hataları Atla)
        run: |
          pnpm config set verify-store-integrity false
          pnpm install --no-frozen-lockfile

      - name: Expo ve EAS Hazırla
        run: |
          pnpm add -g eas-cli expo

      - name: iOS Export
        run: |
          npx expo export --platform ios --non-interactive

      - name: IPA Dosyasını Sakla
        uses: actions/upload-artifact@v4
        with:
          name: Manevi-Kale-IPA
          path: dist/
