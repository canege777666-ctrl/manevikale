name: Manevi Kale IPA Pişirici
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: pnpm Kur
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Bağımlılıkları Zorla Kur
        run: |
          pnpm install --no-frozen-lockfile
          # Eğer expo hala eksik görünüyorsa zorla yükle
          pnpm add expo@latest --save-dev
          pnpm add eas-cli expo -g

      - name: iOS Ayarlarını Temizle ve Hazırla
        run: |
          # Expo'yu sisteme zorla tanıtıyoruz
          npx expo install expo
          npx expo prebuild --platform ios --no-install

      - name: iOS Export
        run: |
          npx expo export --platform ios --non-interactive

      - name: IPA Dosyasını Sakla
        uses: actions/upload-artifact@v4
        with:
          name: Manevi-Kale-IPA
          path: dist/
