name: Manevi Kale IPA Hazırla
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: pnpm Kur
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Bağımlılıkları Kur
        run: pnpm install --no-frozen-lockfile

      - name: iOS Projesini Oluştur (Prebuild)
        # --install flag'ini ekledik ki Cocoapods ve workspace oluşsun
        run: pnpm dlx expo prebuild --platform ios

      - name: Xcode ile Derle (Unsigned)
        run: |
          cd ios
          # Dosya adını dinamik alıyoruz, hata payını sıfırlıyoruz
          WORKSPACE_NAME=$(ls -d *.xcworkspace)
          SCHEME_NAME=$(ls -d *.xcodeproj | sed 's/\.xcodeproj//')
          
          xcodebuild -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath build

      - name: IPA Paketle (KSign için hazır)
        run: |
          mkdir -p Payload
          cp -R ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r ManeviKale_Unsigned.ipa Payload

      - name: Dosyayı Yükle
        uses: actions/upload-artifact@v4
        with:
          name: KSign-Hazir-IPA
          path: ManeviKale_Unsigned.ipa
