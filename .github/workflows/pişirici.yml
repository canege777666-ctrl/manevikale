name: Manevi Kale IPA Pişirici
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: pnpm Kur
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Bağımlılıkları pnpm ile Kur
        run: pnpm install

      - name: Expo ve EAS Hazırla
        run: pnpm add -g eas-cli expo

      - name: iOS Export
        run: npx expo export --platform ios --non-interactive

      - name: IPA Dosyasını Sakla
        uses: actions/upload-artifact@v4
        with:
          name: Manevi-Kale-IPA
          path: dist/
